<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>Quiz</h1>
    <hr />
    <!-- Movie Question -->
    <form id="movie-form">
      <label>
        🎥 What are my favorite tv series?
        <select id="movie-answer">
          <option value="movie1">movie 1</option>
          <option value="movie2">movie 2</option>
          <option value="movie3">Chernobyl:Zone of Exclusion (2014–2017)</option>
          <option value="movie4">movie 4</option>
        </select>
      </label>
      <button type="submit">Check Movie Answer</button>
    </form>
    <div id="movie-result">
      <p id="movie-text"></p>

      <img id="movie1-image" 
      class="movie-image" 
      src="alaska/61jozxQ31xS._AC_SX679_.jpg" 
      style="display:none; width:250px;" /> 

      <img id="movie2-image" 
      class="movie-image" 
      src="chernobyl/baby/Baby_Season_2_Poster.webp" 
      style="display:none; width:260px;" />

      <img id="movie3-image" 
      class="movie-image" 
       src="chernobyl/cGM5mvXOzwGdOr7uPJ1NNedapYE.webp" 
       style="display:none; width:250px;" /> 


<img id="movie4-image" 
      class="movie-image" 
       src="wayne/ryTyaGp0xNQfXvw0uV795kes0Ea.webp" 
       style="display:none; width:250px;" /> 

    </div>
    <hr />
    <!-- Book Question -->
    <form id="season-form">
      <label>
        ❤︎ Which season is my favorite?
        <select id="season-answer">
          <option value="season1">season 1</option>
          <option value="season2">season 2</option> 
          <option value="season3">season 3</option>
          <option value="season4">season 4</option>
        </select>
      </label>
      <button type="submit">Check Book Answer</button>
    </form>
    <div id="season-result">
      <p id="season-text"></p>

<img id="season1-image"
  class="season-image"
  src="1/908087.jpg"
  style="display:none; width:500px;" />

  <img id="season2-image"
  class="season-image"
  src="chernobyl/baby/805407.jpg"
  style="display:none; width:500px;" />

  <img id="season3-image"
  class="season-image"
  src="chernobyl/baby/3/8.jpg"
  style="display:none; width:500px;" />

  <img id="season4-image"
  class="season-image"
  src="no/44518dac71850c103a2d1f6b3e92db68.jpg"
  style="display:none; width:400px;" />


    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      
      //========================Movie Question jQuery Code
      $("#movie-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#movie-answer");
        var answer = $answer.val();

        $(".movie-image").hide();
if (answer === "movie1") {
        $("#movie-text").text("No, but I love it!");
            $("#movie1-image")
      .css("width", "250px")
      .fadeIn()
      .animate({
        width: "320px"
      }, 500);


} else if (answer === "movie2") {
  $("#movie-text").text("Close, but not my favorite!");
  $("#movie2-image")
.css("width", "250px")
.fadeIn()
.animate({
  width: "350px"
}, 500);


        } else if (answer === "movie3") {
        $("#movie-text").text("YESSSS! My favorite!");
$("#movie3-image")
.css("width", "250px")
.fadeIn()
.animate({
  width: "320px"
}, 500);

        } else if (answer === "movie4") {
  $("#movie-text").text("Not my favorite, but it’s still good!");
      $("#movie4-image")
      .css("width", "250px")
      .fadeIn()
      .animate({
        width: "320px"
      }, 500);

 
        } 
        else {
          $("#movie-text").text("Try Again!");
        }
      });

      //=======================Book Question jQuery Code
      $("#season-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#season-answer");
        var answer = $answer.val();

        $(".season-image").hide();


        if (answer === "season1") {
    $("#season-text").text("Close!");
    $("#season1-image").fadeIn();

  } else if (answer === "season2") {
    $("#season-text").text("YESSSS!");
    $("#season2-image").fadeIn();

  } else if (answer === "season3") {
    $("#season-text").text("Not my favorite!");
    $("#season3-image").fadeIn();

  } else if (answer === "season4") {
    $("#season-text").text("There is no season 4!");
    $("#season4-image").fadeIn();

  } else {
    $("#season-text").text("Try Again!");

        }
      });
      
    </script>
  </body>
